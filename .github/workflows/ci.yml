name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: component.wasm
          path: target/wasm32-wasip2/release/*.wasm

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - run: cargo clippy -- -D warnings

  e2e:
    name: E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: component.wasm
      - name: Test
        run: |
          npx @actcore/act run *.wasm --http --listen 3000 &
          npx wait-on http://[::1]:3000/info
          npx @orangeopensource/hurl --test --variable "baseurl=http://[::1]:3000" e2e/*.hurl

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
      - run: cargo fmt -- --check

  publish:
    name: Publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e, clippy, fmt]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: component.wasm
      - uses: oras-project/setup-oras@v1
      - run: echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Publish
        id: publish
        run: |
          VERSION=$(npx @actcore/act info *.wasm --format json | jq -r .version)
          IMAGE="ghcr.io/${{ github.repository }}"
          DIGEST=$(oras push "${IMAGE}:${VERSION}" *.wasm:application/wasm 2>&1 | grep -oP 'sha256:[a-f0-9]+')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Attest
        if: steps.publish.outputs.digest != ''
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.publish.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
