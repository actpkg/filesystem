name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/filesystem

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/filesystem/target
          key: ${{ runner.os }}-cargo-filesystem-${{ hashFiles('components/filesystem/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-filesystem-

      - name: Cargo check
        working-directory: components/filesystem
        run: cargo check

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/filesystem

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/filesystem/target
          key: ${{ runner.os }}-cargo-filesystem-${{ hashFiles('components/filesystem/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-filesystem-

      - name: Build WASM component
        working-directory: components/filesystem
        run: cargo build --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: component_filesystem.wasm
          path: components/filesystem/target/wasm32-wasip2/release/*.wasm

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/filesystem

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Checkout act-host
        uses: actions/checkout@v4
        with:
          repository: actcore/act-host
          path: act-host

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/filesystem/target
            act-host/target
          key: ${{ runner.os }}-e2e-filesystem-${{ hashFiles('components/filesystem/Cargo.lock', 'act-host/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-filesystem-

      - name: Build WASM component
        working-directory: components/filesystem
        run: cargo build --release

      - name: Build act-host
        working-directory: act-host
        run: cargo build --release

      - name: Run e2e test
        run: |
          WASM=$(ls components/filesystem/target/wasm32-wasip2/release/*.wasm | head -1)
          HOST=act-host/target/release/act-host

          echo "=== Testing write_file ==="
          OUTPUT=$($HOST call "$WASM" write_file --args '{"path": "/tmp/e2e_test.txt", "content": "Hello from e2e test"}')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "bytes_written" || (echo "FAIL: expected bytes_written in output" && exit 1)
          echo "PASS"

          echo "=== Testing read_file ==="
          OUTPUT=$($HOST call "$WASM" read_file --args '{"path": "/tmp/e2e_test.txt"}')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Hello from e2e test" || (echo "FAIL: expected written content" && exit 1)
          echo "PASS"

          echo "=== Testing list_directory ==="
          OUTPUT=$($HOST call "$WASM" list_directory --args '{"path": "/tmp"}')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "e2e_test.txt" || (echo "FAIL: expected test file in listing" && exit 1)
          echo "PASS"
